<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">AI 视频作品集封面</title>
  <desc id="desc">用于 B 站视频作品集的蓝紫色动态视觉封面</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#071a35"/>
      <stop offset=".48" stop-color="#2149a5"/>
      <stop offset="1" stop-color="#8b36c6"/>
    </linearGradient>
    <radialGradient id="glow" cx=".72" cy=".36" r=".55">
      <stop offset="0" stop-color="#7ff9ff" stop-opacity=".7"/>
      <stop offset=".46" stop-color="#5d7cff" stop-opacity=".24"/>
      <stop offset="1" stop-color="#071a35" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="play" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff"/>
      <stop offset="1" stop-color="#a9f9ff"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#020816" flood-opacity=".6"/>
    </filter>
  </defs>
  <rect width="1200" height="800" rx="40" fill="url(#bg)"/>
  <rect width="1200" height="800" rx="40" fill="url(#glow)"/>
  <g fill="none" stroke="#fff" stroke-opacity=".13">
    <path d="M0 150h1200M0 650h1200"/>
    <path d="M190 0v800M1010 0v800"/>
    <path d="m716 118 276 160-276 160Z"/>
    <circle cx="850" cy="318" r="252"/>
  </g>
  <g filter="url(#shadow)">
    <circle cx="850" cy="318" r="152" fill="#08152e" fill-opacity=".72" stroke="#fff" stroke-opacity=".4" stroke-width="4"/>
    <path d="M824 238 943 318 824 398Z" fill="url(#play)"/>
  </g>
  <text x="80" y="112" fill="#9ff7ff" font-family="Arial, sans-serif" font-size="28" font-weight="700" letter-spacing="8">AIGC VIDEO COLLECTION</text>
  <text x="76" y="360" fill="#fff" font-family="Arial, 'PingFang SC', sans-serif" font-size="100" font-weight="800">AI 视频</text>
  <text x="82" y="438" fill="#d4e0ff" font-family="Arial, 'PingFang SC', sans-serif" font-size="34" letter-spacing="10">动态影像作品集</text>
  <rect x="80" y="516" width="320" height="64" rx="32" fill="#fff" fill-opacity=".12" stroke="#fff" stroke-opacity=".26"/>
  <text x="124" y="559" fill="#fff" font-family="Arial, 'PingFang SC', sans-serif" font-size="27" font-weight="700">哔哩哔哩 · 16 部</text>
  <text x="80" y="710" fill="#b9c8ea" font-family="Arial, sans-serif" font-size="23" letter-spacing="4">IDEA · IMAGE · MOTION</text>
</svg>
